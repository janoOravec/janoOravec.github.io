<!DOCTYPE html>
<html>
  <head>
    <title>HTML Images Side by Side</title>
    <style>
      /* Vytvoríme triedu pre kontajner obrázkov */
      .image-container {
        display: flex; /* Použijeme flexbox na zobrazenie obrázkov vedľa seba */
        gap: 10px; /* Medzera medzi obrázkami */
      }

      .image-container img {
        width: 300px; /* Nastavíme šírku obrázkov, výška sa prispôsobí */
        height: auto; /* Výška sa prispôsobí pomeru strán */
      }
    </style>
  </head>
  <body>

    <h2>Volna</h2>

    <!-- Kontajner pre obrázky -->
    <div class="image-container">
      <img src="pic_trulli.jpg" alt="Trulli">
      <img src="img_girl.jpg" alt="Girl in a jacket">
      <img src="img_chania.jpg" alt="Flowers in Chania">
    </div>

  </body>
</html>
